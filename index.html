// ─────────────────────────────────────────────
// WEEK UTILITIES  — weeks start on SUNDAY
// ─────────────────────────────────────────────
function getSundayKey(offsetWeeks = 0) {
  const now = new Date();
  const dow = now.getDay(); // 0=Sun
  const sun = new Date(now);
  sun.setDate(now.getDate() - dow + offsetWeeks * 7);
  sun.setHours(0,0,0,0);
  return sun.toISOString().split('T')[0];
}

// Return the Date for a given day label within a week that starts on sunday key
function getDayDate(weekSunKey, dayLabel) {
  const offsets = {MON:1,TUE:2,WED:3,THU:4,FRI:5};
  const sun = new Date(weekSunKey);
  const d = new Date(sun);
  d.setDate(sun.getDate() + (offsets[dayLabel]||0));
  return d;
}

function formatDate(d) {
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function formatDateTime(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' +
    d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}
function getWeekRangeLabel(sunKey) {
  const sun = new Date(sunKey);
  const fri = new Date(sun); fri.setDate(sun.getDate()+5);
  return `${formatDate(sun)} – ${formatDate(fri)}`;
}

// ─────────────────────────────────────────────
// PROGRESSION ENGINE
// ─────────────────────────────────────────────
function isBodyweight(load) { return (load||'').toLowerCase().includes('bodyweight'); }

function isMachine(name) {
  const machines = ['machine','pulldown','extension','curl machine','hip thrust','press machine'];
  return machines.some(m => name.toLowerCase().includes(m));
}

function suggestIncrease(exName, currentLoad) {
  if (isBodyweight(currentLoad)) return null;
  const inc = isMachine(exName) ? '5–10 lb' : '5 lb';
  return inc;
}

// Get all logged weeks sorted oldest first
function getSortedWeeks() {
  return Object.keys(S.allWeeks).sort();
}

// Find last week's exercise data for a given exName and dayLabel
function getLastWeekData(currentSunKey, exName, dayLabel) {
  const weeks = getSortedWeeks();
  const idx = weeks.indexOf(currentSunKey);
  if (idx <= 0) return null;
  // Search backwards for most recent week that has this exercise logged
  for (let i = idx - 1; i >= 0; i--) {
    const wk = weeks[i];
    const wd = S.allWeeks[wk];
    const di = DAY_LABELS.indexOf(dayLabel);
    if (di === -1 || !wd.days[di]) continue;
    const ex = wd.days[di].exercises.find(e => e.name === exName);
    // Check if at least something was logged that day
    const anyDone = wd.days[di].exercises.some((_,ei) => (wd.logged||{})[`${di}-${ei}`]);
    if (ex && anyDone) return { wk, ex };
  }
  return null;
}

// Returns {flag, lastLoad, lastReps, lastSets, suggestion} or null
function getProgressionFlag(currentSunKey, exName, dayLabel, currentEx) {
  if (isBodyweight(currentEx.load)) return null;
  const last = getLastWeekData(currentSunKey, exName, dayLabel);
  if (!last) return null;

  const lastReps = parseInt(last.ex.reps) || 0;
  const lastSets = parseInt(last.ex.sets) || 0;
  const targetReps = parseInt(currentEx.reps) || 0;

  // Flag if last week hit or exceeded target reps
  const hitTarget = lastReps >= targetReps;
  if (!hitTarget) return null;

  const inc = suggestIncrease(exName, currentEx.load);
  return {
    lastLoad: last.ex.load,
    lastReps: last.ex.reps,
    lastSets: last.ex.sets,
    suggestion: inc,
    weekLabel: getWeekRangeLabel(last.wk),
  };
}

// ─────────────────────────────────────────────
const S = {
  view: 'workout',
  activeDay: 0,
  weekOffset: 0,
  editingKey: null,
  editValues: {},
  mobOpen: {},
  mobChecked: {},
  histOpen: {},
  selectedEx: PROGRAM_DAYS[0].exercises[0].name,
  allWeeks: {},
};

const STORAGE_KEY = 'training-tracker-v3';

function loadStorage() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) S.allWeeks = JSON.parse(saved);
  } catch(e) {}
}

function saveStorage() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(S.allWeeks)); }
  catch(e) { alert('Storage failed — browser may be in private mode.'); }
}

// Build a fresh week seeded from last week's data if available
function buildWeek(sunKey) {
  const weeks = getSortedWeeks();
  const lastKey = weeks.filter(w => w < sunKey).pop();
  const lastWd = lastKey ? S.allWeeks[lastKey] : null;

  return {
    sunKey,
    days: PROGRAM_DAYS.map((pd, di) => ({
      ...pd,
      exercises: pd.exercises.map((ex, ei) => {
        // Try to seed from last week
        if (lastWd && lastWd.days[di] && lastWd.days[di].exercises[ei]) {
          const prev = lastWd.days[di].exercises[ei];
          return {
            ...ex,
            load: prev.load || ex.load,
            reps: prev.reps || ex.reps,
            sets: prev.sets || ex.sets,
            setWeights: prev.setWeights ? [...prev.setWeights] : (ex.setWeights ? [...ex.setWeights] : undefined),
          };
        }
        return { ...ex, setWeights: ex.setWeights ? [...ex.setWeights] : undefined };
      }),
    })),
    finishers: FINISHERS.map(f => ({
      exercises: f.exercises.map(ex => {
        return { ...ex };
      })
    })),
    logged: {},       // key -> ISO timestamp when set was logged
    finisherLogged: {},
    completedDates: {},
    finisherDates: {},
  };
}

function ensureWeek(sunKey) {
  if (!S.allWeeks[sunKey]) {
    S.allWeeks[sunKey] = buildWeek(sunKey);
    saveStorage();
  }
}

function getWeekData(sunKey) {
  ensureWeek(sunKey);
  return S.allWeeks[sunKey];
}

function currentSunKey() { return getSundayKey(S.weekOffset); }

// ─────────────────────────────────────────────
// RENDER HELPERS
// ─────────────────────────────────────────────
const TAG_COLORS = {
  PLYO:{bg:'#ff6b6b22',color:'#ff6b6b'},
  ABS:{bg:'#47ff9922',color:'#47ff99'},
  GRIP:{bg:'#ffb84722',color:'#ffb847'}
};

function renderProgBanner(flag, dayColor) {
  if (!flag) return '';
  return `<div class="prog-banner" style="background:#E8FF4710;border:1px solid #E8FF4730;margin-bottom:8px">
    <div class="pb-label" style="color:#E8FF47">📈 READY TO PROGRESS</div>
    <div style="color:#E8FF47;font-size:10px">Last week (${flag.weekLabel}): ${flag.lastSets}×${flag.lastReps} @ ${flag.lastLoad}</div>
    <div style="color:#aaa;font-size:10px;margin-top:2px">Consider increasing weight by ${flag.suggestion}</div>
  </div>`;
}

function renderExCard(ex, key, dayColor, isDone, sunKey, dayLabel, isFinisher) {
  const isEditing = S.editingKey === key;
  const isBW = isBodyweight(ex.load);
  const tag = ex.exTag;
  const tc = tag && TAG_COLORS[tag];
  const rowCls = tag==='PLYO' ? 'plyo' : tag==='ABS' ? 'abs' : '';
  const checkStyle = isDone
    ? `border-color:${dayColor};background:${dayColor};color:#000`
    : 'border-color:#444';
  const checkFn = key.startsWith('f-') ? `toggleFinisher('${key}')` : `toggleCheck('${key}')`;

  const flag = (!isFinisher && !isBW) ? getProgressionFlag(sunKey, ex.name, dayLabel, ex) : null;

  let content = '';
  if (isEditing) {
    const sw = S.editValues.setWeights || [];
    const sr = S.editValues.setReps || [];
    const setRows = sw.map((w,si) => `
      <div style="display:flex;gap:6px;align-items:flex-end;margin-bottom:6px">
        <div style="flex-shrink:0;width:38px;font-size:9px;color:#3a3a3a;padding-bottom:5px">Set ${si+1}</div>
        <div class="edit-field">
          ${si===0?`<div class="edit-label">Reps</div>`:''}
          <input class="edit-input" value="${sr[si]||''}" placeholder="e.g. 8"
            onchange="updateSetRep(${si},this.value)">
        </div>
        ${!isBW ? `<div class="edit-field">
          ${si===0?`<div class="edit-label">Weight</div>`:''}
          <input class="edit-input" value="${w||''}" placeholder="e.g. 40 lb"
            onchange="updateSetWeight(${si},this.value)">
        </div>` : ''}
      </div>`).join('');

    content = `
      ${flag ? renderProgBanner(flag, dayColor) : ''}
      <div class="edit-form">
        <div class="edit-row">
          <div class="edit-field" style="max-width:65px">
            <div class="edit-label">Sets</div>
            <input class="edit-input" type="number" min="1" max="10" value="${S.editValues.sets}"
              oninput="updateEditSets(this.value)">
          </div>
        </div>
        <div>
          <div class="edit-label" style="margin-bottom:7px">Per set — reps${!isBW?' + weight':''}</div>
          ${setRows}
        </div>
        <div style="display:flex;gap:7px">
          <button class="save-btn" style="background:${dayColor}" onclick="saveEdit('${key}')">SAVE</button>
          <button class="cancel-btn" onclick="cancelEdit()">CANCEL</button>
        </div>
      </div>`;
  } else {
    content = `
      ${flag ? renderProgBanner(flag, dayColor) : ''}
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px;flex-wrap:wrap">
        <div>
          <span class="ex-name" style="color:${isDone?'#555':'#e8e8e8'}">${ex.name}</span>
          ${tc?`<span class="tag-pill" style="background:${tc.bg};color:${tc.color}">${tag}</span>`:''}
        </div>
        <button class="edit-btn" onclick="startEdit(event,'${key}')">EDIT</button>
      </div>
      <div class="ex-meta">
        <span class="pill-accent" style="color:${dayColor};background:${dayColor}18">${ex.sets}×${ex.reps}</span>
        ${!isBW?`<span class="pill-dark">${ex.load}</span>`:''}
      </div>
      ${(ex.setWeights&&ex.setWeights.length>1)||(ex.setReps&&ex.setReps.length>1) ? `<div style="font-size:9px;color:#3a3a3a;margin-bottom:4px;line-height:1.7">
        ${(ex.setWeights||[]).map((w,i) => {
          const r = (ex.setReps||[])[i] || ex.reps;
          return `<span style="margin-right:8px">S${i+1}: ${r} reps${!isBW?' @ '+w:''}</span>`;
        }).join('')}
      </div>` : ''}
      <div class="ex-note" style="color:${isDone?'#333':'#666'}">${ex.note||''}</div>`;
  }

  return `
    <div class="ex-card ${rowCls}${isDone?' done':''}${isEditing?' editing':''}" style="border-color:${isEditing?dayColor:''}">
      <div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:${tag==='PLYO'?'#ff6b6b':tag==='ABS'?'#47ff99':dayColor};opacity:${tag?0.6:0.4}"></div>
      <div class="ex-row-inner">
        <div class="check-circle" style="${checkStyle}" onclick="${checkFn}">${isDone?'✓':''}</div>
        <div style="flex:1;min-width:0">${content}</div>
      </div>
    </div>`;
}

// ─────────────────────────────────────────────
// WORKOUT PAGE
// ─────────────────────────────────────────────
function renderWorkout() {
  const sunKey = currentSunKey();
  const wd = getWeekData(sunKey);
  const dayIdx = S.activeDay;
  const day = wd.days[dayIdx];
  const logged = wd.logged || {};
  const finisherLogged = wd.finisherLogged || {};

  // For display: an exercise is "done" if it has a logged timestamp this week
  function isExDone(key) { return !!logged[key]; }
  function isFinDone(key) { return !!finisherLogged[key]; }

  const totalEx = day.exercises.length;
  const doneEx = day.exercises.filter((_,i) => isExDone(`${dayIdx}-${i}`)).length;
  const weekDone = wd.days.filter((d,di) => d.exercises.every((_,ei) => isExDone(`${di}-${ei}`))).length;
  const isCurrentWeek = S.weekOffset === 0;

  // Week navigation
  let html = `<div class="week-nav">
    <button class="week-btn" onclick="changeWeek(-1)">← prev</button>
    <div style="text-align:center">
      <div class="bebas" style="font-size:14px;color:${isCurrentWeek?'#E8FF47':'#ccc'}">${isCurrentWeek?'THIS WEEK':''}</div>
      <div style="font-size:11px;color:#888">${getWeekRangeLabel(sunKey)}</div>
    </div>
    <button class="week-btn" onclick="changeWeek(1)" style="opacity:${S.weekOffset===0?0.2:1}">next →</button>
  </div>
  <div style="display:flex;justify-content:space-between;font-size:9px;color:#3a3a3a;margin-bottom:4px;text-transform:uppercase;letter-spacing:.1em">
    <span>week progress</span><span>${weekDone}/5 sessions</span>
  </div>
  <div class="pb-track"><div class="pb-fill" style="width:${(weekDone/5)*100}%;background:#E8FF47"></div></div>`;

  // Day tabs — show actual date under each
  html += `<div class="day-tabs">`;
  wd.days.forEach((d,i) => {
    const done = d.exercises.every((_,ei) => isExDone(`${i}-${ei}`));
    const isActive = i === S.activeDay;
    const dayDate = getDayDate(sunKey, d.label);
    html += `<div class="day-tab" style="border-bottom-color:${isActive?d.color:'transparent'};color:${isActive?d.color:'#555'}" onclick="setDay(${i})">
      <div class="dt-label">${d.label}</div>
      <div class="dt-type" style="background:${isActive?d.color:'transparent'};color:${isActive?d.textColor:'#555'}">${d.type}</div>
      <div class="dt-date">${formatDate(dayDate)}</div>
      ${done?`<div class="dt-dot" style="background:${d.color}"></div>`:''}
    </div>`;
  });
  html += `</div>`;

  // Day header
  const dayDate = getDayDate(sunKey, day.label);
  html += `<div style="margin-bottom:14px">
    <div style="display:flex;align-items:center;gap:9px;margin-bottom:6px;flex-wrap:wrap">
      <div class="bebas" style="font-size:22px;color:${day.color}">${day.focus}</div>
      <span style="font-size:10px;padding:2px 8px;border-radius:4px;background:${day.color}22;color:${day.color};border:1px solid ${day.color}44">${day.type}</span>
      <span style="font-size:11px;color:#444;margin-left:auto">${doneEx}/${totalEx}</span>
    </div>
    <div style="font-size:10px;color:#3a3a3a;margin-bottom:8px">${day.label} · ${formatDate(dayDate)}</div>
    <div style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;background:#1e1e1e;border:1px solid #2a2a2a;font-size:11px;color:#888">
      <div style="width:6px;height:6px;border-radius:50%;background:${day.color}"></div>${day.tag}
    </div>
  </div>
  <div style="font-size:10px;color:#2a2a2a;letter-spacing:.07em;text-transform:uppercase;margin-bottom:12px">
    Tap ✓ to log completion · EDIT to adjust sets, reps or weight
  </div>`;

  // Sections
  const sections = [
    {label:'Power', filter: ex => ex.exTag==='PLYO'},
    {label:'Strength', filter: ex => !ex.exTag || ex.exTag==='GRIP'},
    {label:'Core', filter: ex => ex.exTag==='ABS'},
  ];
  sections.forEach(sec => {
    const exs = day.exercises.map((ex,i)=>({ex,i})).filter(({ex})=>sec.filter(ex));
    if (!exs.length) return;
    html += `<div class="sec-div">${sec.label}</div>`;
    exs.forEach(({ex,i}) => {
      const key = `${dayIdx}-${i}`;
      html += renderExCard(ex, key, day.color, isExDone(key), sunKey, day.label, false);
    });
  });

  // Banners
  if (doneEx === totalEx) {
    html += `<div class="complete-banner" style="background:${day.color}12;border:1px solid ${day.color}33">
      <div class="bebas" style="font-size:20px;color:${day.color}">SESSION COMPLETE</div>
      <div style="font-size:11px;color:#555;margin-top:3px">REST · RECOVER · COME BACK STRONGER</div>
    </div>`;
  }
  if (weekDone === 5) {
    html += `<div class="complete-banner" style="background:#1a1a0a;border:1px solid #E8FF4733;margin-top:10px">
      <div class="bebas" style="font-size:18px;color:#E8FF47">🏆 FULL WEEK COMPLETE</div>
    </div>`;
  }

  // Finishers
  const finIdx = FINISHER_IDX[day.label];
  const finData = (wd.finishers || FINISHERS.map(f=>({exercises:f.exercises.map(ex=>({...ex}))})))[finIdx];
  if (finData) {
    html += `<div class="finisher-section">
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:10px">
        <div class="bebas" style="font-size:17px;color:${day.color}">IF YOU HAVE TIME</div>
        <span style="font-size:9px;color:#555;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:4px;padding:2px 8px">+5–8 MIN</span>
      </div>
      <div style="font-size:10px;color:#3a3a3a;margin-bottom:10px;letter-spacing:.06em">OPTIONAL FINISHERS — tap ✓ to log · EDIT to adjust</div>`;
    finData.exercises.forEach((ex,fi) => {
      const key = `f-${finIdx}-${fi}`;
      const done = isFinDone(key);
      html += `<div class="finisher-card" style="background:${done?'#111':'#131313'};border:1px solid ${S.editingKey===key?day.color:done?day.color+'44':day.color+'22'};opacity:${done?0.55:1}">
        <div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:${day.color};opacity:${done?1:0.5}"></div>
        ${renderExCard(ex, key, day.color, done, sunKey, day.label, true)}
      </div>`;
    });
    html += `</div>`;
  }

  // Cable-free
  const cf = CABLE_FREE[day.label] || [];
  if (cf.length) {
    html += `<div class="cable-section">
      <div class="bebas" style="font-size:16px;color:#888;margin-bottom:5px">NO CABLE? USE THESE</div>
      <div style="font-size:10px;color:#3a3a3a;margin-bottom:10px;letter-spacing:.05em">DB alternatives for cable exercises today</div>`;
    cf.forEach(c => {
      html += `<div class="cable-card">
        <div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:#444"></div>
        <div style="font-size:9px;color:#3a3a3a;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px">REPLACES: ${c.original}</div>
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px;flex-wrap:wrap">
          <div style="font-size:13px;font-weight:500;color:#bbb">${c.alt}</div>
          <div style="display:flex;gap:5px">
            <span class="pill-dark">${c.sets}×${c.reps}</span>
            <span class="pill-dark">${c.load}</span>
          </div>
        </div>
        <div style="font-size:11px;color:#444;line-height:1.5">${c.note}</div>
      </div>`;
    });
    html += `</div>`;
  }

  document.getElementById('page-workout').innerHTML = html;
}

// ─────────────────────────────────────────────
// MOBILITY PAGE
// ─────────────────────────────────────────────
function renderMobility() {
  let html = `<div class="bebas" style="font-size:26px;color:#fff;margin-bottom:3px">MOBILITY WORK</div>
  <div style="font-size:11px;color:#555;margin-bottom:5px">15–20 min · Before sessions or on rest days</div>
  <div style="font-size:11px;color:#3a3a3a;margin-bottom:20px;line-height:1.6">Pick 2–3 blocks per session, or all 5 for a full mobility day.</div>`;
  MOBILITY.forEach(block => {
    const open = !!S.mobOpen[block.id];
    const done = block.exercises.filter((_,i)=>S.mobChecked[`${block.id}-${i}`]).length;
    html += `<div class="mob-block">
      <div class="mob-header${open?' open':''}" style="border:1px solid ${open?block.color+'55':'#222'}" onclick="toggleMob('${block.id}')">
        <div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:${block.color};opacity:${open?1:0.3}"></div>
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:7px;margin-bottom:3px;flex-wrap:wrap">
              <div class="bebas" style="font-size:16px;color:${open?block.color:'#ccc'}">${block.label}</div>
              <span style="font-size:9px;color:${block.color};background:${block.color}18;border:1px solid ${block.color}33;padding:1px 7px;border-radius:3px;font-weight:600">${block.duration}</span>
              ${done===block.exercises.length?`<span style="font-size:9px;color:#47ff99">✓ DONE</span>`:''}
            </div>
            <div style="font-size:10px;color:#555">🎯 ${block.why}</div>
            <div style="font-size:10px;color:#3a3a3a;margin-top:2px">Equipment: ${block.equipment}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:11px;color:${open?block.color:'#444'}">${open?'▲':'▼'}</div>
            <div style="font-size:10px;color:#3a3a3a">${done}/${block.exercises.length}</div>
          </div>
        </div>
      </div>
      <div class="mob-body${open?' open':''}" style="border:1px solid ${block.color}33">`;
    block.exercises.forEach((ex,ei) => {
      const isDone = !!S.mobChecked[`${block.id}-${ei}`];
      html += `<div class="mob-ex" style="border-bottom:${ei<block.exercises.length-1?'1px solid #1a1a1a':'none'};opacity:${isDone?0.4:1}" onclick="toggleMobEx('${block.id}',${ei})">
        <div style="width:20px;height:20px;border-radius:50%;border:2px solid ${isDone?block.color:'#333'};background:${isDone?block.color:'transparent'};display:flex;align-items:center;justify-content:center;font-size:11px;color:#000;flex-shrink:0;margin-top:2px">${isDone?'✓':''}</div>
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:3px;flex-wrap:wrap">
            <div style="font-size:13px;font-weight:500;color:${isDone?'#444':'#ddd'}">${ex.name}</div>
            <span style="font-size:10px;color:${block.color};background:${block.color}15;padding:2px 8px;border-radius:4px;font-weight:500;flex-shrink:0">${ex.duration}</span>
          </div>
          <div style="font-size:11px;color:${isDone?'#2e2e2e':'#666'};line-height:1.6">${ex.note}</div>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });
  html += `<div style="margin-top:14px;padding:13px 14px;border-radius:10px;background:#141414;border:1px solid #1e1e1e;font-size:11px;color:#555;line-height:1.8">
    <span style="color:#888;font-weight:500">Before upper sessions:</span> Thoracic + Shoulder Rotation<br>
    <span style="color:#888;font-weight:500">Before lower sessions:</span> Hip Flexors + Ankle + Posterior Chain<br>
    <span style="color:#888;font-weight:500">Rest day:</span> All 5 blocks · ~18–20 min
  </div>`;
  document.getElementById('page-mobility').innerHTML = html;
}

// ─────────────────────────────────────────────
// HISTORY PAGE
// ─────────────────────────────────────────────
function renderHistory() {
  let html = `<div class="bebas" style="font-size:26px;color:#fff;margin-bottom:3px">SESSION HISTORY</div>
  <div style="font-size:11px;color:#444;margin-bottom:18px">Tap a day tile to see logged exercises and timestamps</div>`;

  const weeks = getSortedWeeks().reverse();
  if (!weeks.length) {
    html += `<div style="color:#333;font-size:12px;text-align:center;margin-top:60px">No sessions logged yet.</div>`;
  }

  weeks.forEach(sunKey => {
    const wd = S.allWeeks[sunKey];
    const logged = wd.logged || {};
    const sessComplete = wd.days.filter((d,di) => d.exercises.every((_,ei) => logged[`${di}-${ei}`])).length;
    const totalDone = Object.keys(logged).filter(k => !k.startsWith('f-')).length;
    const totalEx = wd.days.reduce((s,d)=>s+d.exercises.length,0);

    // Unique days that had any activity
    const activeDates = [...new Set(
      Object.entries(logged)
        .filter(([k]) => !k.startsWith('f-'))
        .map(([,iso]) => new Date(iso).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}))
    )];

    html += `<div class="hist-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div>
          <div class="bebas" style="font-size:17px;color:#fff">${getWeekRangeLabel(sunKey)}</div>
          <div style="font-size:9px;color:#3a3a3a;margin-top:2px">${activeDates.slice(0,4).join(' · ')}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:13px;color:${sessComplete===5?'#E8FF47':'#888'};font-weight:500">${sessComplete}/5 sessions</div>
          <div style="font-size:10px;color:#3a3a3a">${totalDone}/${totalEx} exercises</div>
        </div>
      </div>
      <div class="hist-day-grid">`;

    wd.days.forEach((d,di) => {
      const done = d.exercises.every((_,ei) => logged[`${di}-${ei}`]);
      const partial = !done && d.exercises.some((_,ei) => logged[`${di}-${ei}`]);
      const dayDate = getDayDate(sunKey, d.label);
      const histKey = `h-${sunKey}-${di}`;
      html += `<div class="hist-day-tile" style="background:${done?d.color+'33':partial?'#1e1e14':'#1a1a1a'};border-color:${done?d.color+'55':partial?'#3a3a22':'#222'}" onclick="toggleHist('${histKey}')">
        <div style="font-size:9px;font-family:'Bebas Neue',sans-serif;color:${done?d.color:partial?'#888':'#333'};letter-spacing:.08em">${d.label}</div>
        <div style="font-size:8px;color:${done?d.color:partial?'#666':'#333'};margin-top:1px">${done?'✓':partial?'~':'–'}</div>
        <div style="font-size:7px;color:#444;margin-top:2px">${formatDate(dayDate)}</div>
      </div>`;
    });
    html += `</div>`;

    // Drill-down for each day
    wd.days.forEach((d,di) => {
      const histKey = `h-${sunKey}-${di}`;
      const isOpen = !!S.histOpen[histKey];
      if (!isOpen) { html += `<div class="hist-drill" id="${histKey}"></div>`; return; }
      html += `<div class="hist-drill open" id="${histKey}" style="border:1px solid ${d.color}33">
        <div style="display:flex;justify-content:space-between;margin-bottom:7px">
          <div class="bebas" style="font-size:13px;color:${d.color}">${d.label} — ${d.focus}</div>
          <div style="font-size:9px;color:#444">${d.exercises.filter((_,ei)=>logged[`${di}-${ei}`]).length}/${d.exercises.length}</div>
        </div>`;
      d.exercises.forEach((ex,ei) => {
        const key = `${di}-${ei}`;
        const ts = logged[key];
        const isBW = isBodyweight(ex.load);
        html += `<div class="hist-ex-row" style="opacity:${ts?1:0.35}">
          <div style="font-size:11px;color:${ts?'#ccc':'#444'};flex:1;min-width:0">${ex.name}</div>
          <div style="display:flex;gap:4px;align-items:center;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end">
            <span style="font-size:10px;color:${ts?d.color:'#333'};background:${ts?d.color+'18':'#1a1a1a'};padding:1px 6px;border-radius:3px">${ex.sets}×${ex.reps}</span>
            ${!isBW?`<span class="pill-dark" style="font-size:10px">${ex.load}</span>`:''}
            ${ex.setWeights&&ex.setWeights.length>1?`<span style="font-size:9px;color:#3a3a3a">${ex.setWeights.map((w,i)=>`S${i+1}:${(ex.setReps||[])[i]||ex.reps}r${!isBW?' '+w:''}`).join(' ')}</span>`:''}
            ${!ex.setWeights&&ex.setReps&&ex.setReps.length>1?`<span style="font-size:9px;color:#3a3a3a">${ex.setReps.map((r,i)=>`S${i+1}:${r}r`).join(' ')}</span>`:''}
          </div>
          ${ts?`<div style="font-size:9px;color:#555;width:100%;text-align:right;margin-top:2px">${formatDateTime(ts)}</div>`:''}
        </div>`;
      });
      html += `</div>`;
    });

    html += `</div>`;
  });

  document.getElementById('page-history').innerHTML = html;
}

// ─────────────────────────────────────────────
// PROGRESS PAGE
// ─────────────────────────────────────────────
function renderProgress() {
  const allNames = [...new Set(PROGRAM_DAYS.flatMap(d=>d.exercises.map(e=>e.name)))];
  const sel = S.selectedEx || allNames[0];
  const opts = allNames.map(n=>`<option value="${n}"${n===sel?'selected':''}>${n}</option>`).join('');

  let html = `<div class="bebas" style="font-size:26px;color:#fff;margin-bottom:3px">EXERCISE PROGRESS</div>
  <div style="font-size:11px;color:#444;margin-bottom:14px">Week-over-week load tracking + progression flags</div>
  <select class="sel-input" onchange="S.selectedEx=this.value;renderProgress()">${opts}</select>`;

  // Collect all weeks where this exercise was logged
  const data = [];
  getSortedWeeks().forEach(sunKey => {
    const wd = S.allWeeks[sunKey];
    wd.days.forEach((d,di) => {
      const ex = d.exercises.find(e => e.name === sel);
      if (!ex) return;
      const logged = wd.logged || {};
      const anyDone = d.exercises.some((_,ei) => logged[`${di}-${ei}`]);
      if (anyDone) data.push({sunKey, ex, dayLabel:d.label});
    });
  });

  // Show progression recommendation at top if applicable
  if (data.length >= 2) {
    const last = data[data.length-1];
    const prev = data[data.length-2];
    const lastReps = parseInt(last.ex.reps)||0;
    const prevReps = parseInt(prev.ex.reps)||0;
    const targetReps = parseInt(last.ex.reps)||0;
    if (lastReps >= targetReps && prevReps >= targetReps && !isBodyweight(last.ex.load)) {
      const inc = suggestIncrease(sel, last.ex.load);
      html += `<div style="padding:11px 14px;border-radius:9px;margin-bottom:14px;background:#E8FF4710;border:1px solid #E8FF4733">
        <div style="font-size:9px;color:#E8FF47;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px">📈 TRAINER RECOMMENDATION</div>
        <div style="font-size:11px;color:#E8FF47">Rep target hit 2 weeks in a row — increase weight by ${inc}</div>
        <div style="font-size:10px;color:#888;margin-top:3px">Last: ${prev.ex.sets}×${prev.ex.reps} @ ${prev.ex.load} → This week: ${last.ex.sets}×${last.ex.reps} @ ${last.ex.load}</div>
      </div>`;
    }
  }

  if (!data.length) {
    html += `<div style="color:#333;font-size:12px;text-align:center;margin-top:40px">No data yet.<br>Log a session to start tracking.</div>`;
  } else {
    data.forEach((entry,i) => {
      const isLatest = i === data.length-1;
      const isBW = isBodyweight(entry.ex.load);
      html += `<div class="prog-entry">
        <div style="width:74px;font-size:10px;color:#555;flex-shrink:0">${formatDate(getDayDate(entry.sunKey, entry.dayLabel))}</div>
        <div class="prog-bar-wrap" style="border-color:${isLatest?'#E8FF4755':'#1e1e1e'}">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:13px;color:${isLatest?'#E8FF47':'#ccc'};font-weight:500">${isBW?'Bodyweight':entry.ex.load}</span>
            <span style="font-size:10px;color:#555">${entry.ex.sets}×${entry.ex.reps}</span>
          </div>
          ${entry.ex.setWeights&&entry.ex.setWeights.length>1?`<div style="font-size:9px;color:#3a3a3a;margin-top:2px">${entry.ex.setWeights.join(' / ')}</div>`:''}
        </div>
        ${isLatest?`<div style="font-size:10px;color:#E8FF47;flex-shrink:0">← now</div>`:''}
      </div>`;
    });
  }

  // Stats
  const weeks = getSortedWeeks();
  if (weeks.length) {
    const totalSess = Object.values(S.allWeeks).reduce((s,wd)=>s+wd.days.filter((d,di)=>d.exercises.every((_,ei)=>(wd.logged||{})[`${di}-${ei}`])).length,0);
    const totalEx = Object.values(S.allWeeks).reduce((s,wd)=>s+Object.keys(wd.logged||{}).filter(k=>!k.startsWith('f-')).length,0);
    const fullWeeks = Object.values(S.allWeeks).filter(wd=>wd.days.every((d,di)=>d.exercises.every((_,ei)=>(wd.logged||{})[`${di}-${ei}`]))).length;
    html += `<div class="bebas" style="font-size:17px;color:#fff;margin:26px 0 10px">OVERALL STATS</div>
    <div class="stat-grid">
      ${[['Weeks Logged',weeks.length],['Full Weeks',fullWeeks],['Total Sessions',totalSess],['Exercises Logged',totalEx]].map(([l,v])=>`
      <div class="stat-card">
        <div class="bebas" style="font-size:26px;color:#E8FF47">${v}</div>
        <div style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.08em">${l}</div>
      </div>`).join('')}
    </div>`;
  }

  document.getElementById('page-progress').innerHTML = html;
}

// ─────────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────────
function showPage(v) {
  S.view = v;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+v).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>{ if(b.textContent.includes(v)) b.classList.add('active'); });
  renderPage();
}

function renderPage() {
  if (S.view==='workout') renderWorkout();
  else if (S.view==='mobility') renderMobility();
  else if (S.view==='history') renderHistory();
  else if (S.view==='progress') renderProgress();
}

function changeWeek(dir) {
  if (dir===1 && S.weekOffset===0) return;
  S.weekOffset += dir;
  S.editingKey = null;
  renderWorkout();
}

function setDay(i) {
  S.activeDay = i;
  S.editingKey = null;
  renderWorkout();
}

// Logging: mark exercise as done with timestamp. Re-tapping removes the log (allows correction).
function toggleCheck(key) {
  if (S.editingKey) return;
  const sunKey = currentSunKey();
  ensureWeek(sunKey);
  const wd = S.allWeeks[sunKey];
  if (!wd.logged) wd.logged = {};
  if (wd.logged[key]) {
    delete wd.logged[key];
  } else {
    wd.logged[key] = new Date().toISOString();
  }
  saveStorage();
  renderWorkout();
}

function toggleFinisher(key) {
  if (S.editingKey) return;
  const sunKey = currentSunKey();
  ensureWeek(sunKey);
  const wd = S.allWeeks[sunKey];
  if (!wd.finisherLogged) wd.finisherLogged = {};
  if (wd.finisherLogged[key]) {
    delete wd.finisherLogged[key];
  } else {
    wd.finisherLogged[key] = new Date().toISOString();
  }
  saveStorage();
  renderWorkout();
}

function startEdit(e, key) {
  e.stopPropagation();
  const sunKey = currentSunKey();
  const wd = getWeekData(sunKey);
  let ex;
  if (key.startsWith('f-')) {
    const [,fi,ei] = key.split('-').map(Number);
    const fins = wd.finishers || FINISHERS.map(f=>({exercises:f.exercises.map(ex=>({...ex}))}));
    ex = fins[fi].exercises[ei];
  } else {
    const [di,ei] = key.split('-').map(Number);
    ex = wd.days[di].exercises[ei];
  }
  const n = parseInt(ex.sets) || 3;
  const sw = ex.setWeights && ex.setWeights.length===n ? [...ex.setWeights] : Array(n).fill(ex.load||'');
  const sr = ex.setReps && ex.setReps.length===n ? [...ex.setReps] : Array(n).fill(ex.reps||'');
  S.editingKey = key;
  S.editValues = {sets:ex.sets, reps:ex.reps, load:ex.load||'', setWeights:sw, setReps:sr};
  renderWorkout();
}

function updateEditSets(val) {
  const n = Math.max(1, Math.min(10, parseInt(val)||1));
  const curW = S.editValues.setWeights || [];
  const curR = S.editValues.setReps || [];
  S.editValues.sets = String(n);
  S.editValues.setWeights = Array(n).fill(null).map((_,i) => curW[i]!==undefined ? curW[i] : (curW[curW.length-1]||S.editValues.load||''));
  S.editValues.setReps = Array(n).fill(null).map((_,i) => curR[i]!==undefined ? curR[i] : (curR[curR.length-1]||S.editValues.reps||''));
  renderWorkout();
}

function updateSetRep(si, val) {
  S.editValues.setReps[si] = val;
}

function updateSetWeight(si, val) {
  S.editValues.setWeights[si] = val;
}

function saveEdit(key) {
  const sunKey = currentSunKey();
  ensureWeek(sunKey);
  const wd = S.allWeeks[sunKey];
  const sw = S.editValues.setWeights || [];
  const sr = S.editValues.setReps || [];
  const uniqueW = [...new Set(sw.filter(Boolean))];
  const uniqueR = [...new Set(sr.filter(Boolean))];
  const displayLoad = uniqueW.length===1 ? uniqueW[0] : uniqueW.length>1 ? uniqueW.join(' / ') : S.editValues.load;
  const displayReps = uniqueR.length===1 ? uniqueR[0] : uniqueR.length>1 ? uniqueR.join(' / ') : S.editValues.reps;
  const updated = {
    reps: displayReps,
    sets: S.editValues.sets,
    load: displayLoad,
    setWeights: sw.length > 1 ? sw : undefined,
    setReps: sr.length > 1 ? sr : undefined,
  };

  if (key.startsWith('f-')) {
    const [,fi,ei] = key.split('-').map(Number);
    if (!wd.finishers) wd.finishers = FINISHERS.map(f=>({exercises:f.exercises.map(ex=>({...ex}))}));
    Object.assign(wd.finishers[fi].exercises[ei], updated);
  } else {
    const [di,ei] = key.split('-').map(Number);
    Object.assign(wd.days[di].exercises[ei], updated);
  }
  S.editingKey = null;
  saveStorage();
  renderWorkout();
}

function cancelEdit() {
  S.editingKey = null;
  renderWorkout();
}

function toggleMob(id) {
  S.mobOpen[id] = !S.mobOpen[id];
  renderMobility();
}
function toggleMobEx(blockId, ei) {
  const k = `${blockId}-${ei}`;
  S.mobChecked[k] = !S.mobChecked[k];
  renderMobility();
}
function toggleHist(key) {
  S.histOpen[key] = !S.histOpen[key];
  renderHistory();
}

// ─────────────────────────────────────────────
// AUTO-GENERATE UPCOMING WEEKS
// ─────────────────────────────────────────────
function autoGenerateWeeks() {
  // Always ensure current week and next 4 weeks exist
  for (let i = 0; i <= 4; i++) {
    const key = getSundayKey(i);
    ensureWeek(key);
  }
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
loadStorage();
autoGenerateWeeks();
renderPage();
</script>
</body>
</html>
